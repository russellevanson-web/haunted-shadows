<head>

  <title>Haunted Shadows Paranormal</title>
  <style>
    :root {
      --ink: #f3f1ff;
      --panel: rgba(15, 12, 28, 0.66);
      --line: rgba(255,255,255,0.12);
      --green: #9cffb9;
      --gold: #ffd36d;
      --danger: #ff7c96;
      --blue1: #9fd2ff;
      --blue2: #427cff;
      --blue3: #233f91;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #09070f;
      font-family: Arial, sans-serif;
      touch-action: none;
      color: var(--ink);
    }
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 50% 0%, #322153 0%, #171125 48%, #09070f 100%);
    }
    #hud {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      padding: max(10px, env(safe-area-inset-top)) 10px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.24), rgba(0,0,0,0));
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
    }
    .hudBox {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }
    #gameWrap { position: relative; flex: 1; min-height: 0; }
    canvas { width: 100%; height: 100%; display: block; }
    #topButtons {
      position: absolute;
      top: 64px;
      right: 10px;
      z-index: 7;
      display: flex;
      gap: 8px;
    }
    .smallBtn {
      border: 0;
      padding: 10px 12px;
      border-radius: 14px;
      color: white;
      background: rgba(15,12,28,.62);
      border: 1px solid var(--line);
      backdrop-filter: blur(6px);
      font-weight: 700;
    }
    #controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      display: flex;
      justify-content: space-between;
      align-items: end;
      padding: 12px max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      pointer-events: none;
    }
    .cluster { display: flex; gap: 10px; pointer-events: auto; }
    .btn {
      width: 74px;
      height: 74px;
      border: 0;
      border-radius: 22px;
      color: white;
      font-weight: 800;
      font-size: 28px;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 -5px 0 rgba(0,0,0,.2), 0 10px 18px rgba(0,0,0,.24);
      user-select: none;
    }
    .btn:active { transform: translateY(2px); }
    #jumpBtn {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      color: #351800;
      font-size: 18px;
      background: linear-gradient(180deg, #ffd980, #ffab4e);
    }
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 5, 13, .42);
      padding: 20px;
    }
    #overlayCard {
      width: min(92vw, 460px);
      padding: 22px;
      border-radius: 26px;
      background: rgba(16, 12, 29, .86);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 70px rgba(0,0,0,.42);
      text-align: center;
    }
    #overlay h2 { margin: 0 0 8px; font-size: 32px; }
    #overlay p { margin: 8px 0; line-height: 1.35; opacity: .96; }
    .cta {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: 0;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      color: #0d210f;
      background: linear-gradient(180deg, #a2ffb8, #4fe07d);
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
    }
    .logoTitle {
      font-size: clamp(28px, 8vw, 54px);
      line-height: 0.95;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 0 0 10px;
      text-shadow: 0 4px 0 rgba(0,0,0,.35), 0 0 18px rgba(159,210,255,.2);
    }
    .logoTop { color: #e6f3ff; display:block; }
    .logoBottom { color: #9fd2ff; display:block; }
    .pressStart {
      margin-top: 14px;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: blink 1s steps(2, start) infinite;
      color: #ffd36d;
    }
    @keyframes blink { 50% { opacity: .25; } }
    @media (min-width: 700px) {
      .btn { width: 84px; height: 84px; }
      #jumpBtn { width: 106px; height: 106px; }
    }

    player.onGround = false;
    state.cameraX = 0;
  }

  function resetGame(full=true) {
    if (full) {
      state.levelIndex = 0;
      state.souls = 0;
      state.lives = maxLives;
      state.startTs = performance.now();
      state.musicStep = 0;
      state.won = false;
    }
    state.over = false;
    state.invuln = 0;
    state.powerTimer = 0;
    state.scene = 'title';
    cloneLevel(state.levelIndex);
    showTitleScreen();
    updateHUD();
  }

  function showTitleScreen() {
    overlayTitle.innerHTML = '<span class="logoTitle"><span class="logoTop">Haunted Shadows</span><span class="logoBottom">Paranormal</span></span>';
    overlayText.textContent = 'A haunted stage-play platformer.';
    overlaySub.textContent = 'Collect souls, light lanterns, defeat the boss ghost, and escape the mansion.';
    pressStartText.style.display = 'block';
    startBtn.textContent = 'Start';
    overlay.style.display = 'flex';
  }

  function showOverlay(title, text, button='Continue', sub='') {
    overlayTitle.innerHTML = title;
    overlayText.textContent = text;
    overlaySub.textContent = sub;
    pressStartText.style.display = 'none';
    startBtn.textContent = button;
    overlay.style.display = 'flex';
  }
  function hideOverlay() { overlay.style.display = 'none'; }

  function updateHUD() {
    const secs = Math.floor((performance.now() - state.startTs) / 1000);
    const mm = Math.floor(secs / 60);
    const ss = String(secs % 60).padStart(2,'0');
    leftHud.textContent = `Souls: ${state.souls} · Lives: ${state.lives}`;
    rightHud.textContent = `${levels[state.levelIndex].name} · ${mm}:${ss}`;
    if (boss && boss.alive) centerHud.textContent = `👻 Haunted Shadows Paranormal · Boss HP ${boss.hits}`;
    else centerHud.textContent = state.powerTimer > 0 ? '🕯️ Lantern Shield' : '👻 Haunted Shadows Paranormal';
  }

  function rects(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
  function circleRect(c,r){ const cx=Math.max(r.x,Math.min(c.x,r.x+r.w)); const cy=Math.max(r.y,Math.min(c.y,r.y+r.h)); const dx=c.x-cx,dy=c.y-cy; return dx*dx+dy*dy < c.r*c.r; }
  function allSolids(){ return [...solids, ...movers]; }

  function resolve(axis) {
    for (const s of allSolids()) {
      if (!rects(player, s)) continue;
      if (axis === 'x') {
        if (player.vx > 0) player.x = s.x - player.w;
        if (player.vx < 0) player.x = s.x + s.w;
        player.vx = 0;
      } else {
        if (player.vy > 0) {
          player.y = s.y - player.h;
          player.vy = 0;
          player.onGround = true;
        } else if (player.vy < 0) {
          player.y = s.y + s.h;
          player.vy = 0;
        }
      }
    }
  }

  function loseLife() {
    if (state.invuln > 0 || state.over) return;
    state.lives--;
    state.invuln = 100;
    sfx.hit();
    if (state.lives <= 0) {
      state.over = true;
      state.scene = 'end';
      showOverlay('The shadows consumed you', `You rescued ${state.souls} souls before the mansion won.`, 'Play Again');
    } else {
      player.x = current.start.x;
      player.y = current.start.y;
      player.vx = 0;
      player.vy = -4;
      state.cameraX = Math.max(0, player.x - W * 0.25);
    }
    updateHUD();
  }

  function completeLevel() {
    sfx.flag();
    if (state.levelIndex < levels.length - 1) {
      state.levelIndex++;
      cloneLevel(state.levelIndex);
      state.scene = 'map';
      started = false;
      showOverlay('Haunted World Map', `Level ${state.levelIndex} cleared. The path opens to ${levels[state.levelIndex].name}.`, 'Enter Next Level');
    } else {
      state.over = true;
      state.won = true;
      state.scene = 'end';
      showOverlay('You escaped the haunted mansion!', `Final score: ${state.souls} souls collected.`, 'Play Again');
    }
    updateHUD();
  }

  function damageBoss() {
    if (!boss || !boss.alive) return;
    boss.hits--;
    boss.flash = 12;
    sfx.bossHit();
    player.vy = -9;
    if (boss.hits <= 0) {
      boss.alive = false;
      bossProjectiles = [];
      sfx.bossDefeat();
    }
  }

  function spawnBossProjectile() {
    if (!boss || !boss.alive) return;
    if (boss.type === 'ghostKing') {
      bossProjectiles.push({ x: boss.x + boss.w * 0.5, y: boss.y + 40, r: 14, vx: -2.6, vy: -1.8, type: 'miniGhost', alive: true });
    } else if (boss.type === 'granny') {
      bossProjectiles.push({ x: boss.x + 20, y: boss.y + 34, r: 12, vx: -3.2, vy: -3.8, type: 'sprout', alive: true, spin: 0 });
    }
  }

  function update(dt) {
    if (!started || state.over || state.scene === 'map' || state.scene === 'title') return;

    for (const m of movers) m.y = m.baseY + Math.sin(performance.now() * m.speed + m.phase) * m.amp;

    if (keys.left) { player.vx -= player.speed; player.facing = -1; }
    if (keys.right) { player.vx += player.speed; player.facing = 1; }
    if (!keys.left && !keys.right) {
      player.vx *= friction;
      if (Math.abs(player.vx) < 0.05) player.vx = 0;
    }

    const maxSpeed = player.maxSpeed * (state.powerTimer > 0 ? 1.2 : 1);
    if (player.vx > maxSpeed) player.vx = maxSpeed;
    if (player.vx < -maxSpeed) player.vx = -maxSpeed;

    if (keys.jump && player.onGround) {
      player.vy = -(player.jumpPower + (state.powerTimer > 0 ? 1.4 : 0));
      player.onGround = false;
      sfx.jump();
    }

    player.vy += gravity;
    player.x += player.vx;
    resolve('x');
    player.y += player.vy;
    player.onGround = false;
    resolve('y');

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > worldWidth) player.x = worldWidth - player.w;
    if (player.y > H + 240) loseLife();

    if (Math.abs(player.vx) > 0.18 && player.onGround) player.walkFrame += dt * 14;
    if (state.invuln > 0) state.invuln--;
    if (state.powerTimer > 0) state.powerTimer--;

    for (const p of pickups) {
      if (p.taken) continue;
      if (circleRect({ x:p.x, y:p.y, r:12 }, player)) {
        p.taken = true;
        if (p.kind === 'soul') { state.souls++; sfx.soul(); }
        else { state.powerTimer = 520; sfx.power(); }
      }
    }

    for (const e of enemies) {
      if (!e.alive) continue;
      e.flap += dt * 12;
      e.x += e.vx * e.dir;
      if (e.x < e.minX || e.x > e.maxX) e.dir *= -1;
      if (e.type === 'ghost') e.y += Math.sin(performance.now() * 0.005 + e.x * 0.02) * 0.55;
      else e.y += Math.sin(performance.now() * 0.011 + e.x * 0.03) * 1.1;
      const hitbox = { x:e.x, y:e.y, w:e.type === 'bat' ? 30 : 28, h:e.type === 'bat' ? 18 : 28 };
      if (rects(player, hitbox)) {
        const stomp = player.vy > 0 && player.y + player.h - e.y < 18;
        if (stomp || state.powerTimer > 0) {
          e.alive = false;
          player.vy = -8;
          sfx.stomp();
        } else {
          loseLife();
        }
      }
    }

    if (boss && boss.alive) {
      boss.flap += dt * 9;
      boss.x += boss.vx * boss.dir;
      if (boss.x < boss.minX || boss.x > boss.maxX) boss.dir *= -1;
      boss.y += Math.sin(performance.now() * 0.004 + boss.x * 0.01) * 0.75;
      if (boss.flash > 0) boss.flash--;
      boss.shotTimer += dt;
      if (boss.shotTimer > (boss.type === 'granny' ? 1.4 : 1.9)) {
        boss.shotTimer = 0;
        spawnBossProjectile();
      }
      const hitbox = { x: boss.x, y: boss.y, w: boss.w, h: boss.h };
      if (rects(player, hitbox)) {
        const stomp = player.vy > 0 && player.y + player.h - boss.y < 24;
        if (stomp || state.powerTimer > 0) damageBoss();
        else loseLife();
      }
    }

    for (const proj of bossProjectiles) {
      if (!proj.alive) continue;
      proj.x += proj.vx;
      proj.y += proj.vy;
      if (proj.type === 'sprout') {
        proj.vy += 0.16;
        proj.spin += dt * 10;
      } else {
        proj.y += Math.sin(performance.now() * 0.01 + proj.x * 0.05) * 0.8;
      }
      const hit = { x: proj.x - proj.r, y: proj.y - proj.r, w: proj.r * 2, h: proj.r * 2 };
      if (rects(player, hit)) {
        if (player.vy > 0 && player.y + player.h - hit.y < 18) {
          proj.alive = false;
          player.vy = -6;
          sfx.stomp();
        } else if (state.powerTimer > 0) {
          proj.alive = false;
        } else {
          loseLife();
        }
      }
      if (proj.x < state.cameraX - 100 || proj.x > state.cameraX + W + 100 || proj.y > H + 200) proj.alive = false;
    }

    if ((!boss || !boss.alive) && player.x + player.w > goal.x && player.y + player.h > goal.y) completeLevel();

    const targetCam = player.x - W * 0.35;
    state.cameraX += (targetCam - state.cameraX) * 0.12;
    state.cameraX = Math.max(0, Math.min(state.cameraX, worldWidth - W));

    updateHUD();
  }

  function rr(x,y,w,h,r,fill=true,stroke=false){ const rad=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rad,y); ctx.arcTo(x+w,y,x+w,y+h,rad); ctx.arcTo(x+w,y+h,x,y+h,rad); ctx.arcTo(x,y+h,x,y,rad); ctx.arcTo(x,y,x+w,y,rad); ctx.closePath(); if(fill)ctx.fill(); if(stroke)ctx.stroke(); }

  function drawBackground() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, current.skyTop);
    g.addColorStop(0.55, current.skyMid);
    g.addColorStop(1, current.skyBot);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    const moonX = W - 88;
    ctx.fillStyle = 'rgba(255,244,210,.95)';
    ctx.beginPath(); ctx.arc(moonX, 86, 34, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.14)';
    ctx.beginPath(); ctx.arc(moonX - 9, 75, 10, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,.07)';
    for (let i=0;i<6;i++) {
      const x = ((i*200) - state.cameraX * (0.12 + i*0.02)) % (W + 240) - 140;
      mist(x, 110 + i*46, 120 + i*12);
    }

    for (let i=0;i<7;i++) {
      const x = ((i*230) - state.cameraX * 0.22) % (W + 260) - 100;
      hill(x, H - 190 - (i%2)*26, 150 + (i%3)*20);
    }
    for (let i=0;i<8;i++) {
      const x = ((i*170) - state.cameraX * 0.38) % (W + 200) - 80;
      spire(x, H - 170 - (i%3)*28, 80 + (i%2)*18);
    }
    houseLayer();
  }
  function mist(x,y,w){ ctx.beginPath(); ctx.ellipse(x,y,w,24,0,0,Math.PI*2); ctx.ellipse(x+w*0.4,y+8,w*0.8,18,0,0,Math.PI*2); ctx.fill(); }
  function hill(x,y,size){ ctx.fillStyle='rgba(35,28,56,.82)'; ctx.beginPath(); ctx.moveTo(x,H); ctx.quadraticCurveTo(x+size*0.45,y,x+size,H); ctx.closePath(); ctx.fill(); ctx.fillStyle='rgba(150,135,210,.15)'; ctx.beginPath(); ctx.ellipse(x+size*0.45,y+26,size*0.24,18,0,0,Math.PI*2); ctx.fill(); }
  function spire(x,y,h){ ctx.fillStyle='rgba(10,10,18,.74)'; ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x+16,y+h); ctx.lineTo(x+30,H); ctx.closePath(); ctx.fill(); ctx.fillRect(x+7,y+h,16,H-(y+h)); ctx.fillStyle='rgba(255,210,110,.18)'; ctx.fillRect(x+10,y+h+16,4,7); ctx.fillRect(x+16,y+h+32,4,7); }
  function houseLayer(){
    const baseY = H - 120;
    for (let i=0;i<5;i++) {
      const x = ((i*290) - state.cameraX * 0.5) % (W + 340) - 140;
      ctx.fillStyle = 'rgba(22,17,34,.85)';
      rr(x, baseY - 90 - (i%2)*16, 110, 90 + (i%2)*16, 12, true, false);
      ctx.beginPath(); ctx.moveTo(x + 8, baseY - 90 - (i%2)*16); ctx.lineTo(x + 55, baseY - 128 - (i%2)*16); ctx.lineTo(x + 102, baseY - 90 - (i%2)*16); ctx.closePath(); ctx.fill();
      const flick = 0.7 + 0.3 * Math.sin(performance.now() * 0.01 + i);
      ctx.fillStyle = `rgba(255,210,110,${0.18 * flick})`;
      ctx.fillRect(x + 18, baseY - 60, 12, 18);
      ctx.fillRect(x + 44, baseY - 44, 12, 18);
      ctx.fillRect(x + 72, baseY - 64, 12, 18);
    }
  }

  function drawSolid(s, ox) {
    const x = s.x + ox;
    if (x + s.w < -100 || x > W + 100) return;
    if (s.type === 'floor') {
      const grad = ctx.createLinearGradient(0, s.y, 0, s.y + s.h);
      grad.addColorStop(0, '#7b8cb8'); grad.addColorStop(0.07, '#505978'); grad.addColorStop(1, '#2e3148');
      ctx.fillStyle = grad; ctx.fillRect(x, s.y, s.w, s.h);
      ctx.fillStyle = '#a0afd9'; ctx.fillRect(x, s.y, s.w, 5);
      ctx.fillStyle = 'rgba(255,255,255,.09)';
      for (let i=0;i<s.w;i+=44) { ctx.fillRect(x+i, s.y+14, 20, 6); ctx.fillRect(x+i+22, s.y+34, 14, 5); }
      for (let i=0;i<s.w;i+=70) drawGrassTuft(x+i+10, s.y+2);
    } else if (s.type === 'stone' || s.type === 'moving') {
      const grad = ctx.createLinearGradient(0,s.y,0,s.y+s.h);
      grad.addColorStop(0,'#b7c2e2'); grad.addColorStop(.16,'#8c97be'); grad.addColorStop(1,'#656e95');
      ctx.fillStyle = grad; rr(x, s.y, s.w, s.h, 8, true, false);
      ctx.fillStyle = 'rgba(255,255,255,.30)'; rr(x+2, s.y+2, s.w-4, 4, 2, true, false);
      ctx.strokeStyle = 'rgba(56,64,95,.55)'; ctx.lineWidth = 1.25;
      for (let bx=0; bx<s.w; bx+=24) ctx.strokeRect(x+bx+1, s.y+1, Math.min(22, s.w-bx-2), s.h-2);
      if (s.type === 'moving') { drawChain(x + 12, s.y - 60, s.y); drawChain(x + s.w - 12, s.y - 60, s.y); }
    } else if (s.type === 'coffin') {
      const grad = ctx.createLinearGradient(0,s.y,0,s.y+s.h);
      grad.addColorStop(0,'#845339'); grad.addColorStop(1,'#4d2b1d');
      ctx.fillStyle = grad; rr(x,s.y,s.w,s.h,10,true,false);
      ctx.fillStyle = '#a86b49'; rr(x+5,s.y+5,s.w-10,s.h-10,8,true,false);
      ctx.fillStyle = '#efd18b'; ctx.fillRect(x+s.w/2-2,s.y+12,4,s.h-24); ctx.fillRect(x+s.w/2-10,s.y+s.h/2-2,20,4);
      ctx.fillStyle = 'rgba(255,255,255,.14)'; rr(x+7,s.y+7,s.w-14,4,2,true,false);
    }
  }
  function drawGrassTuft(x,y){ ctx.fillStyle='rgba(114,230,144,.32)'; ctx.beginPath(); ctx.moveTo(x,y+10); ctx.lineTo(x+4,y); ctx.lineTo(x+8,y+10); ctx.lineTo(x+12,y+2); ctx.lineTo(x+16,y+10); ctx.closePath(); ctx.fill(); }
  function drawChain(x, y1, y2){ ctx.strokeStyle='rgba(210,214,232,.28)'; ctx.lineWidth=2; ctx.beginPath(); for(let y=y1;y<y2;y+=8){ ctx.moveTo(x, y); ctx.lineTo(x, y+5);} ctx.stroke(); }

  function drawPickup(p, ox) {
    if (p.taken) return;
    const x = p.x + ox;
    if (x < -40 || x > W + 40) return;
    const bob = Math.sin(performance.now() * 0.005 + p.phase) * 4;
    if (p.kind === 'soul') {
      ctx.fillStyle = '#cbfbff';
      ctx.beginPath();
      ctx.arc(x, p.y + bob, 11, Math.PI, 0);
      ctx.lineTo(x + 11, p.y + bob + 11);
      ctx.quadraticCurveTo(x + 5, p.y + bob + 6, x, p.y + bob + 13);
      ctx.quadraticCurveTo(x - 5, p.y + bob + 6, x - 11, p.y + bob + 11);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#29475c'; ctx.fillRect(x-4,p.y+bob-2,2,3); ctx.fillRect(x+2,p.y+bob-2,2,3);
      ctx.fillStyle = 'rgba(255,255,255,.34)'; ctx.beginPath(); ctx.arc(x-4,p.y+bob-4,3,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(255,238,160,.18)'; ctx.beginPath(); ctx.arc(x,p.y+bob-12,24,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f6d37a'; rr(x-8,p.y+bob-10,16,20,4,true,false);
      ctx.fillStyle = '#fff4c1'; ctx.beginPath(); ctx.arc(x,p.y+bob-14,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f59e0b'; ctx.fillRect(x-2,p.y+bob+2,4,8);
    }
  }

  function drawEnemy(e, ox) {
    if (!e.alive) return;
    const x = e.x + ox;
    if (x < -70 || x > W + 70) return;
    if (e.type === 'ghost') {
      ctx.fillStyle = '#eefcff';
      ctx.beginPath();
      ctx.arc(x+14, e.y+12, 13, Math.PI, 0);
      ctx.lineTo(x+27,e.y+24);
      ctx.quadraticCurveTo(x+23,e.y+30,x+19,e.y+25);
      ctx.quadraticCurveTo(x+14,e.y+32,x+10,e.y+25);
      ctx.quadraticCurveTo(x+6,e.y+30,x+1,e.y+25);
      ctx.lineTo(x+1,e.y+12);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#2a3950'; ctx.fillRect(x+8,e.y+10,3,5); ctx.fillRect(x+17,e.y+10,3,5);
      ctx.fillStyle='rgba(255,255,255,.28)'; ctx.beginPath(); ctx.arc(x+9,e.y+8,4,0,Math.PI*2); ctx.fill();
    } else {
      const flap = Math.sin(e.flap) * 4;
      ctx.fillStyle = '#5a4694';
      ctx.beginPath();
      ctx.moveTo(x, e.y + 10);
      ctx.quadraticCurveTo(x + 6, e.y - flap, x + 14, e.y + 4);
      ctx.quadraticCurveTo(x + 22, e.y - flap, x + 28, e.y + 10);
      ctx.lineTo(x + 18, e.y + 18);
      ctx.lineTo(x + 10, e.y + 18);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#dacfff'; ctx.fillRect(x+8,e.y+8,3,3); ctx.fillRect(x+17,e.y+8,3,3);
    }
  }

  function drawBoss(ox) {
    if (!boss || !boss.alive) return;
    const x = boss.x + ox;
    const y = boss.y;
    if (x < -120 || x > W + 120) return;

    if (boss.type === 'granny') {
      if (boss.flash > 0) {
        ctx.fillStyle = 'rgba(255,140,180,.28)';
        ctx.beginPath(); ctx.arc(x + boss.w/2, y + boss.h/2, 62, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#7f5f4d';
      rr(x + 18, y + 20, 48, 58, 18, true, false);
      ctx.fillStyle = '#d9d7ea';
      ctx.beginPath(); ctx.arc(x + 43, y + 24, 24, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#f1d6bf';
      ctx.beginPath(); ctx.arc(x + 43, y + 38, 20, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2a3950';
      ctx.fillRect(x + 34, y + 34, 3, 3);
      ctx.fillRect(x + 48, y + 34, 3, 3);
      ctx.fillRect(x + 38, y + 48, 12, 4);
      ctx.strokeStyle = '#d7e8ff';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x + 37, y + 37, 6, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + 49, y + 37, 6, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#4f8f3a';
      rr(x + 10, y + 70, 66, 18, 8, true, false);
    } else {
      if (boss.flash > 0) {
        ctx.fillStyle = 'rgba(255,140,180,.28)';
        ctx.beginPath(); ctx.arc(x + boss.w/2, y + boss.h/2, 62, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#f3fbff';
      ctx.beginPath();
      ctx.arc(x + 44, y + 34, 38, Math.PI, 0);
      ctx.lineTo(x + 82, y + 78);
      ctx.quadraticCurveTo(x + 70, y + 92, x + 58, y + 80);
      ctx.quadraticCurveTo(x + 44, y + 96, x + 30, y + 80);
      ctx.quadraticCurveTo(x + 18, y + 92, x + 6, y + 78);
      ctx.lineTo(x + 6, y + 34);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#2a3950';
      ctx.fillRect(x + 26, y + 30, 7, 10);
      ctx.fillRect(x + 52, y + 30, 7, 10);
      ctx.fillRect(x + 34, y + 52, 16, 6);
      ctx.fillStyle = 'rgba(255,255,255,.38)';
      ctx.beginPath(); ctx.arc(x + 28, y + 22, 10, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawBossProjectiles(ox) {
    for (const proj of bossProjectiles) {
      if (!proj.alive) continue;
      const x = proj.x + ox;
      const y = proj.y;
      if (proj.type === 'sprout') {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(proj.spin || 0);
        ctx.fillStyle = '#63a948';
        ctx.beginPath(); ctx.ellipse(0, 0, 10, 14, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#8fcf73';
        ctx.fillRect(-2, -16, 4, 8);
        ctx.restore();
      } else {
        ctx.fillStyle = '#dff8ff';
        ctx.beginPath();
        ctx.arc(x, y - 4, proj.r, Math.PI, 0);
        ctx.lineTo(x + proj.r, y + proj.r - 2);
        ctx.quadraticCurveTo(x + 5, y + 8, x, y + proj.r);
        ctx.quadraticCurveTo(x - 5, y + 8, x - proj.r, y + proj.r - 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#2a3950';
        ctx.fillRect(x - 5, y - 6, 2, 3);
        ctx.fillRect(x + 2, y - 6, 2, 3);
      }
    }
  }

  function drawGoal(ox) {
    const x = goal.x + ox;
    const pole = ctx.createLinearGradient(0,goal.y-goal.h,0,goal.y);
    pole.addColorStop(0,'#aab0ca'); pole.addColorStop(1,'#656b88');
    ctx.fillStyle = pole; rr(x,goal.y-goal.h,goal.w,goal.h,8,true,false);
    ctx.fillStyle = '#9cffb8';
    ctx.beginPath();
    ctx.moveTo(x+goal.w, goal.y-goal.h+12);
    ctx.quadraticCurveTo(x+goal.w+22, goal.y-goal.h+8, x+goal.w+38, goal.y-goal.h+24);
    ctx.quadraticCurveTo(x+goal.w+18, goal.y-goal.h+28, x+goal.w, goal.y-goal.h+32);
    ctx.closePath(); ctx.fill();
  }

  function drawPlayer(ox) {
    const x = player.x + ox;
    if (state.invuln > 0 && Math.floor(state.invuln / 5) % 2 === 0) return;
    if (state.powerTimer > 0) { ctx.fillStyle='rgba(180,220,255,.24)'; ctx.beginPath(); ctx.arc(x+15,player.y+19,28,0,Math.PI*2); ctx.fill(); }

    const step = Math.sin(player.walkFrame) * 2;
    const robe = ctx.createLinearGradient(0,player.y+8,0,player.y+34);
    robe.addColorStop(0,'#9fd2ff'); robe.addColorStop(1,'#427cff');

    ctx.fillStyle='#dcefff'; rr(x+5,player.y,18,9,4,true,false);
    ctx.fillStyle=robe; rr(x,player.y+8,30,13,6,true,false);
    ctx.fillStyle='#f0d2b6'; rr(x+7,player.y+10,16,10,4,true,false);
    const body = ctx.createLinearGradient(0,player.y+20,0,player.y+34);
    body.addColorStop(0,'#3557bf'); body.addColorStop(1,'#233f91');
    ctx.fillStyle=body; rr(x+5,player.y+20,19,11,4,true,false);
    ctx.fillStyle='#171f4a'; rr(x+4,player.y+30+(player.onGround?step:0),8,8,3,true,false); rr(x+17,player.y+30-(player.onGround?step:0),8,8,3,true,false);
    ctx.fillStyle='#12275f'; if(player.facing===1) ctx.fillRect(x+16,player.y+13,6,2); else ctx.fillRect(x+7,player.y+13,6,2);
    ctx.fillStyle='rgba(255,255,255,.24)'; rr(x+2,player.y+10,5,12,3,true,false);
  }

  function drawWorldMap() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#2d204e'); g.addColorStop(1,'#100c1b');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    for (let i=0;i<5;i++) mist(80 + i*130, 90 + i*55, 80 + i*6);
    const pts = [
      {x: W*0.14, y:H*0.73, label:'Level 1'},
      {x: W*0.35, y:H*0.58, label:'Level 2'},
      {x: W*0.56, y:H*0.44, label:'Level 3'},
      {x: W*0.76, y:H*0.30, label:'Level 4'},
      {x: W*0.90, y:H*0.20, label:'Exit'}
    ];
    ctx.strokeStyle = 'rgba(255,214,115,.55)'; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
    pts.forEach((p, i) => {
      ctx.fillStyle = i <= state.levelIndex ? '#ffd36d' : 'rgba(255,255,255,.14)';
      ctx.beginPath(); ctx.arc(p.x,p.y,22,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1027'; ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f6f2ff'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center'; ctx.fillText(p.label, p.x, p.y + 48);
    });
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f6f2ff';
    ctx.font = 'bold 28px Arial';
    ctx.fillText('Haunted World Map', W/2, 80);
    ctx.font = '18px Arial';
    ctx.fillText('The curtain rises on the next level...', W/2, 110);
  }

  function drawTitleBackdrop() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#261a48'); g.addColorStop(1,'#09070f');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    for (let i=0;i<6;i++) {
      ctx.fillStyle = 'rgba(255,255,255,.05)';
      mist(60 + i*140, 80 + (i%3)*50, 90 + i*8);
    }
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ecf7ff';
    ctx.font = 'bold 42px Arial';
    ctx.fillText('Haunted Shadows', W/2, H*0.28);
    ctx.fillStyle = '#9fd2ff';
    ctx.font = 'bold 34px Arial';
    ctx.fillText('Paranormal', W/2, H*0.36);
    ctx.fillStyle = 'rgba(255,255,255,.12)';
    ctx.fillRect(W*0.18, H*0.42, W*0.64, 2);
  }

  function draw() {
    if (state.scene === 'map') { drawWorldMap(); return; }
    if (state.scene === 'title') drawTitleBackdrop(); else drawBackground();
    const ox = -state.cameraX;
    if (state.scene !== 'title') {
      for (const s of solids) drawSolid(s, ox);
      for (const m of movers) drawSolid(m, ox);
      for (const p of pickups) drawPickup(p, ox);
      for (const e of enemies) drawEnemy(e, ox);
      drawBoss(ox);
      drawBossProjectiles(ox);
      drawGoal(ox);
      drawPlayer(ox);
      ctx.fillStyle = 'rgba(255,255,255,.05)'; ctx.fillRect(0, H - 110, W, 110);
    }
  }

  function frame(ts) {
    const dt = (ts - lastTime) / 1000;
    lastTime = ts;
    tickMusic(dt);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function hold(btn, key) {
    const on = e => { e.preventDefault(); initAudio(); keys[key] = true; };
    const off = e => { e.preventDefault(); keys[key] = false; };
    btn.addEventListener('touchstart', on, { passive:false });
    btn.addEventListener('touchend', off, { passive:false });
    btn.addEventListener('touchcancel', off, { passive:false });
    btn.addEventListener('mousedown', on);
    btn.addEventListener('mouseup', off);
    btn.addEventListener('mouseleave', off);
  }
  hold(document.getElementById('leftBtn'), 'left');
  hold(document.getElementById('rightBtn'), 'right');
  const jumpBtn = document.getElementById('jumpBtn');
  const doJump = e => { e.preventDefault(); initAudio(); keys.jump = true; setTimeout(()=>keys.jump=false,120); };
  jumpBtn.addEventListener('touchstart', doJump, { passive:false });
  jumpBtn.addEventListener('mousedown', doJump);

  addEventListener('keydown', e => {
    if (['ArrowLeft','ArrowRight','ArrowUp','Space','Enter'].includes(e.code)) e.preventDefault();
    initAudio();
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'ArrowUp' || e.code === 'Space') keys.jump = true;
    if (e.code === 'Enter' && state.scene === 'title') {
      hideOverlay();
      started = true;
      state.scene = 'playing';
    }
  });
  addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'ArrowUp' || e.code === 'Space') keys.jump = false;
  });

  startBtn.addEventListener('click', () => {
    initAudio();
    if (actx && actx.state === 'suspended') actx.resume();
    hideOverlay();
    if (state.scene === 'title') { started = true; state.scene = 'playing'; }
    else if (state.scene === 'map') { started = true; state.scene = 'playing'; }
    else if (state.scene === 'end') { resetGame(true); }
  });

  restartBtn.addEventListener('click', () => { started = false; resetGame(true); });
  soundBtn.addEventListener('click', () => {
    initAudio();
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊 Sound' : '🔇 Sound';
  });

  cloneLevel(0);
  showTitleScreen();
  overlay.style.display = 'flex';
  updateHUD();
  requestAnimationFrame(frame);
})();
</script></body>
</html>
