function cloneLevel(i){ const L=levels[i]; worldWidth=L.width; goal={...L.goal}; solids=L.solids.map(s=>({...s})); movers=L.movers.map(m=>({...m})); pickups=L.pickups.map(p=>({...p,taken:false,phase:Math.random()Math.PI2})); enemies=L.enemies.map(e=>({...e,alive:true,dir:1,vx:e.speed,flap:0})); boss=L.boss?{...L.boss,alive:true,dir:1,flap:0,flash:0}:null; bossProjectiles=[]; state.barrels=[]; player.x=L.start.x; player.y=L.start.y; player.vx=0; player.vy=0; player.onGround=false; state.cameraX=0; } function showTitle(){ overlayTitle.innerHTML='<span class="logoTitle"><span class="logoTop">Haunted Shadows</span><span class="logoBottom">Paranormal</span></span>'; overlayText.textContent='A haunted stage-play platformer.'; overlaySub.textContent='Collect souls, light lanterns, defeat the bosses, and escape the shadows.'; pressStartText.style.display='block'; startBtn.textContent='Start'; overlay.style.display='flex'; } function showOverlay(t,txt,btn='Continue',sub=''){ overlayTitle.innerHTML=t; overlayText.textContent=txt; overlaySub.textContent=sub; pressStartText.style.display='none'; startBtn.textContent=btn; overlay.style.display='flex'; } function hideOverlay(){ overlay.style.display='none'; } function resetGame(full=true){ if(full){ state.levelIndex=0; state.souls=0; state.lives=maxLives; state.startTs=performance.now(); state.won=false; } state.over=false; state.invuln=0; state.powerTimer=0; state.scene='title'; cloneLevel(state.levelIndex); showTitle(); updateHUD(); }

function update(dt){ if(!started||state.over||state.scene==='map'||state.scene==='title') return; for(const m of movers) m.y=m.baseY+Math.sin(performance.now()m.speed+m.phase)m.amp; if(keys.left){ player.vx-=player.speed; player.facing=-1; } if(keys.right){ player.vx+=player.speed; player.facing=1; } if(!keys.left&&!keys.right){ player.vx=friction; if(Math.abs(player.vx)<.05) player.vx=0; } const maxSpeed=player.maxSpeed(state.powerTimer>0?1.2:1); player.vx=Math.max(-maxSpeed,Math.min(maxSpeed,player.vx)); if(keys.jump&&player.onGround){ player.vy=-(player.jumpPower+(state.powerTimer>0?1.4:0)); player.onGround=false; } player.vy+=gravity; player.x+=player.vx; resolve('x'); player.y+=player.vy; player.onGround=false; resolve('y'); if(player.x<0) player.x=0; if(player.x+player.w>worldWidth) player.x=worldWidth-player.w; if(player.y>H+240) loseLife(); if(Math.abs(player.vx)>.18&&player.onGround) player.walkFrame += dt*14; if(state.invuln>0) state.invuln--; if(state.powerTimer>0) state.powerTimer--;

}

if(boss&&boss.alive){ boss.flap+=dt*9; boss.x+=boss.vx*boss.dir; if(boss.x<boss.minX||boss.x>boss.maxX) boss.dir*=-1; boss.y+=Math.sin(performance.now()*0.004+boss.x*0.01)*0.75; if(boss.flash>0) boss.flash--; boss.shotTimer+=dt; if(boss.shotTimer>(boss.type==='granny'?1.4:1.9)){ boss.shotTimer=0; spawnBossProjectile(); } const hit={x:boss.x,y:boss.y,w:boss.w,h:boss.h}; if(rects(player,hit)){ const stomp=player.vy>0&&player.y+player.h-boss.y<24; if(stomp||state.powerTimer>0) damageBoss(); else loseLife(); } }
for(const proj of bossProjectiles){ if(!proj.alive) continue; proj.x+=proj.vx; proj.y+=proj.vy; if(proj.type==='sprout'){ proj.vy+=.16; proj.spin+=dt*10; } else proj.y += Math.sin(performance.now()*0.01+proj.x*0.05)*.8; const hit={x:proj.x-proj.r,y:proj.y-proj.r,w:proj.r*2,h:proj.r*2}; if(rects(player,hit)){ if(player.vy>0 && player.y+player.h-hit.y<18){ proj.alive=false; player.vy=-6; } else if(state.powerTimer>0) proj.alive=false; else loseLife(); } if(proj.x<state.cameraX-100||proj.x>state.cameraX+W+100||proj.y>H+200) proj.alive=false; }

if((!boss||!boss.alive)&&player.x+player.w>goal.x&&player.y+player.h>goal.y) completeLevel();
const targetCam=player.x-W*.35; state.cameraX += (targetCam-state.cameraX)*.12; state.cameraX=Math.max(0,Math.min(state.cameraX,worldWidth-W)); updateHUD(); }

function rr(x,y,w,h,r,fill=true){ const rad=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rad,y); ctx.arcTo(x+w,y,x+w,y+h,rad); ctx.arcTo(x+w,y+h,x,y+h,rad); ctx.arcTo(x,y+h,x,y,rad); ctx.arcTo(x,y,x+w,y,rad); ctx.closePath(); if(fill) ctx.fill(); } function updateHUD(){ const secs=Math.floor((performance.now()-state.startTs)/1000), mm=Math.floor(secs/60), ss=String(secs%60).padStart(2,'0'); leftHud.textContent=Souls: ${state.souls} · Lives: ${state.lives}; rightHud.textContent=${levels[state.levelIndex].name} · ${mm}:${ss}; centerHud.textContent=(boss&&boss.alive)?👻 Haunted Shadows Paranormal · Boss HP ${boss.hits}:(state.powerTimer>0?'🕯️ Lantern Shield':'👻 Haunted Shadows Paranormal'); }

function drawMist(x,y,w){ ctx.fillStyle='rgba(255,255,255,.07)'; ctx.beginPath(); ctx.ellipse(x,y,w,24,0,0,Math.PI2); ctx.ellipse(x+w.4,y+8,w*.8,18,0,0,Math.PI2); ctx.fill(); } function drawBackground(){ const L=levels[state.levelIndex]; const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,L.skyTop); g.addColorStop(.55,L.skyMid); g.addColorStop(1,L.skyBot); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.fillStyle='rgba(255,244,210,.95)'; ctx.beginPath(); ctx.arc(W-88,86,34,0,Math.PI2); ctx.fill(); for(let i=0;i<6;i++){ const x=((i200)-state.cameraX(.12+i*.02))%(W+240)-140; drawMist(x,110+i46,120+i12); } drawLevelProps(); } function drawLevelProps(){ if(state.levelIndex===0) drawPrisonProps(); if(state.levelIndex===1) drawMansionProps(); if(state.levelIndex===2) drawPubProps(); if(state.levelIndex===3) drawDollProps(); } function drawPrisonProps(){ for(let i=0;i<8;i++){ const x=(i260-state.cameraX.3)%(W+300)-50; ctx.fillStyle='#1b1e2b'; ctx.fillRect(x,200,6,200); ctx.fillRect(x+18,200,6,200); ctx.fillStyle='#2a2f45'; ctx.fillRect(x,200,24,10); const swing=Math.sin(performance.now().003+i)8; ctx.save(); ctx.translate(x+12,210); ctx.rotate(swing.02); ctx.fillStyle='#ffd27a'; ctx.fillRect(-4,0,8,14); ctx.restore(); } } function drawMansionProps(){ for(let i=0;i<5;i++){ const x=(i320-state.cameraX*.25)%(W+350); ctx.fillStyle='#2c1e2e'; ctx.fillRect(x,260,90,160); const flick=(Math.sin(performance.now().008+i)>0.2); ctx.fillStyle=flick?'#ffd27a':'#3b273a'; ctx.fillRect(x+20,290,14,18); ctx.fillRect(x+50,320,14,18); } } function drawPubProps(){ for(let i=0;i<6;i++){ const x=(i300-state.cameraX*.28)%(W+350); ctx.fillStyle='#4a2d1f'; ctx.fillRect(x,340,80,20); ctx.fillStyle='#6b3f2a'; ctx.fillRect(x+10,320,60,20); const bounce=Math.sin(performance.now().01+i)3; ctx.fillStyle='#c9a36a'; ctx.fillRect(x+30,300+bounce,10,20); } } function drawDollProps(){ for(let i=0;i<7;i++){ const x=(i260-state.cameraX.3)%(W+320); ctx.fillStyle='#3a2a3f'; ctx.fillRect(x,260,70,140); const blink=Math.sin(performance.now().02+i)>0.8; ctx.fillStyle=blink?'#ff6b6b':'#e7d7f5'; ctx.beginPath(); ctx.arc(x+35,300,12,0,Math.PI2); ctx.fill(); ctx.fillStyle='#2a3950'; ctx.fillRect(x+30,295,2,3); ctx.fillRect(x+38,295,2,3); } } function drawSolid(s,ox){ const x=s.x+ox; if(x+s.w<-100||x>W+100) return; if(s.type==='floor'){ const grad=ctx.createLinearGradient(0,s.y,0,s.y+s.h); grad.addColorStop(0,'#7b8cb8'); grad.addColorStop(.07,'#505978'); grad.addColorStop(1,'#2e3148'); ctx.fillStyle=grad; ctx.fillRect(x,s.y,s.w,s.h); ctx.fillStyle='#a0afd9'; ctx.fillRect(x,s.y,s.w,5); } else if(s.type==='stone'||s.type==='moving'){ const grad=ctx.createLinearGradient(0,s.y,0,s.y+s.h); grad.addColorStop(0,'#b7c2e2'); grad.addColorStop(.16,'#8c97be'); grad.addColorStop(1,'#656e95'); ctx.fillStyle=grad; rr(x,s.y,s.w,s.h,8,true); } else { const grad=ctx.createLinearGradient(0,s.y,0,s.y+s.h); grad.addColorStop(0,'#845339'); grad.addColorStop(1,'#4d2b1d'); ctx.fillStyle=grad; rr(x,s.y,s.w,s.h,10,true); } } function drawPickup(p,ox){ if(p.taken) return; const x=p.x+ox; if(x<-40||x>W+40) return; const bob=Math.sin(performance.now().005+p.phase)4; if(p.kind==='soul'){ ctx.fillStyle='#cbfbff'; ctx.beginPath(); ctx.arc(x,p.y+bob,11,Math.PI,0); ctx.lineTo(x+11,p.y+bob+11); ctx.quadraticCurveTo(x+5,p.y+bob+6,x,p.y+bob+13); ctx.quadraticCurveTo(x-5,p.y+bob+6,x-11,p.y+bob+11); ctx.closePath(); ctx.fill(); } else { ctx.fillStyle='rgba(255,238,160,.18)'; ctx.beginPath(); ctx.arc(x,p.y+bob-12,24,0,Math.PI2); ctx.fill(); ctx.fillStyle='#f6d37a'; rr(x-8,p.y+bob-10,16,20,4,true); ctx.fillStyle='#fff4c1'; ctx.beginPath(); ctx.arc(x,p.y+bob-14,8,0,Math.PI2); ctx.fill(); } } function drawEnemy(e,ox){ if(!e.alive) return; const x=e.x+ox; if(x<-70||x>W+70) return; if(e.type==='ghost'){ ctx.fillStyle='#eefcff'; ctx.beginPath(); ctx.arc(x+14,e.y+12,13,Math.PI,0); ctx.lineTo(x+27,e.y+24); ctx.quadraticCurveTo(x+23,e.y+30,x+19,e.y+25); ctx.quadraticCurveTo(x+14,e.y+32,x+10,e.y+25); ctx.quadraticCurveTo(x+6,e.y+30,x+1,e.y+25); ctx.lineTo(x+1,e.y+12); ctx.closePath(); ctx.fill(); } else { const flap=Math.sin(e.flap)4; ctx.fillStyle='#5a4694'; ctx.beginPath(); ctx.moveTo(x,e.y+10); ctx.quadraticCurveTo(x+6,e.y-flap,x+14,e.y+4); ctx.quadraticCurveTo(x+22,e.y-flap,x+28,e.y+10); ctx.lineTo(x+18,e.y+18); ctx.lineTo(x+10,e.y+18); ctx.closePath(); ctx.fill(); } } function drawBoss(ox){ if(!boss||!boss.alive) return; const x=boss.x+ox, y=boss.y; if(x<-120||x>W+120) return; if(boss.type==='granny'){ if(boss.flash>0){ ctx.fillStyle='rgba(255,140,180,.28)'; ctx.beginPath(); ctx.arc(x+boss.w/2,y+boss.h/2,62,0,Math.PI2); ctx.fill(); } ctx.fillStyle='#7f5f4d'; rr(x+18,y+20,48,58,18,true); ctx.fillStyle='#d9d7ea'; ctx.beginPath(); ctx.arc(x+43,y+24,24,Math.PI,0); ctx.fill(); ctx.fillStyle='#f1d6bf'; ctx.beginPath(); ctx.arc(x+43,y+38,20,0,Math.PI2); ctx.fill(); ctx.fillStyle='#4f8f3a'; rr(x+10,y+70,66,18,8,true); } else { if(boss.flash>0){ ctx.fillStyle='rgba(255,140,180,.28)'; ctx.beginPath(); ctx.arc(x+boss.w/2,y+boss.h/2,62,0,Math.PI2); ctx.fill(); } ctx.fillStyle='#f3fbff'; ctx.beginPath(); ctx.arc(x+44,y+34,38,Math.PI,0); ctx.lineTo(x+82,y+78); ctx.quadraticCurveTo(x+70,y+92,x+58,y+80); ctx.quadraticCurveTo(x+44,y+96,x+30,y+80); ctx.quadraticCurveTo(x+18,y+92,x+6,y+78); ctx.lineTo(x+6,y+34); ctx.closePath(); ctx.fill(); } } function drawBossProjectiles(ox){ for(const p of bossProjectiles){ if(!p.alive) continue; const x=p.x+ox,y=p.y; if(p.type==='sprout'){ ctx.save(); ctx.translate(x,y); ctx.rotate(p.spin||0); ctx.fillStyle='#63a948'; ctx.beginPath(); ctx.ellipse(0,0,10,14,0,0,Math.PI2); ctx.fill(); ctx.restore(); } else { ctx.fillStyle='#dff8ff'; ctx.beginPath(); ctx.arc(x,y-4,p.r,Math.PI,0); ctx.lineTo(x+p.r,y+p.r-2); ctx.quadraticCurveTo(x+5,y+8,x,y+p.r); ctx.quadraticCurveTo(x-5,y+8,x-p.r,y+p.r-2); ctx.closePath(); ctx.fill(); } } } function drawGoal(ox){ const x=goal.x+ox; const pole=ctx.createLinearGradient(0,goal.y-goal.h,0,goal.y); pole.addColorStop(0,'#aab0ca'); pole.addColorStop(1,'#656b88'); ctx.fillStyle=pole; rr(x,goal.y-goal.h,goal.w,goal.h,8,true); ctx.fillStyle='#9cffb8'; ctx.beginPath(); ctx.moveTo(x+goal.w,goal.y-goal.h+12); ctx.quadraticCurveTo(x+goal.w+22,goal.y-goal.h+8,x+goal.w+38,goal.y-goal.h+24); ctx.quadraticCurveTo(x+goal.w+18,goal.y-goal.h+28,x+goal.w,goal.y-goal.h+32); ctx.closePath(); ctx.fill(); } function drawPlayer(ox){ const x=player.x+ox; if(state.invuln>0&&Math.floor(state.invuln/5)%2===0) return; if(state.powerTimer>0){ ctx.fillStyle='rgba(180,220,255,.24)'; ctx.beginPath(); ctx.arc(x+15,player.y+19,28,0,Math.PI2); ctx.fill(); } const step=Math.sin(player.walkFrame)2; const robe=ctx.createLinearGradient(0,player.y+8,0,player.y+34); robe.addColorStop(0,'#9fd2ff'); robe.addColorStop(1,'#427cff'); ctx.fillStyle='#dcefff'; rr(x+5,player.y,18,9,4,true); ctx.fillStyle=robe; rr(x,player.y+8,30,13,6,true); ctx.fillStyle='#f0d2b6'; rr(x+7,player.y+10,16,10,4,true); const body=ctx.createLinearGradient(0,player.y+20,0,player.y+34); body.addColorStop(0,'#3557bf'); body.addColorStop(1,'#233f91'); ctx.fillStyle=body; rr(x+5,player.y+20,19,11,4,true); ctx.fillStyle='#171f4a'; rr(x+4,player.y+30+(player.onGround?step:0),8,8,3,true); rr(x+17,player.y+30-(player.onGround?step:0),8,8,3,true); } function drawWorldMap(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#2d204e'); g.addColorStop(1,'#100c1b'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); for(let i=0;i<5;i++) drawMist(80+i130,90+i55,80+i6); const pts=[{x:W*.14,y:H*.73,label:'Level 1'},{x:W*.35,y:H*.58,label:'Level 2'},{x:W*.56,y:H*.44,label:'Level 3'},{x:W*.76,y:H*.30,label:'Level 4'},{x:W*.90,y:H*.20,label:'Exit'}]; ctx.strokeStyle='rgba(255,214,115,.55)'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y); ctx.stroke(); pts.forEach((p,i)=>{ ctx.fillStyle=i<=state.levelIndex?'#ffd36d':'rgba(255,255,255,.14)'; ctx.beginPath(); ctx.arc(p.x,p.y,22,0,Math.PI2); ctx.fill(); ctx.fillStyle='#1a1027'; ctx.beginPath(); ctx.arc(p.x,p.y,10,0,Math.PI2); ctx.fill(); ctx.fillStyle='#f6f2ff'; ctx.font='bold 18px Arial'; ctx.textAlign='center'; ctx.fillText(p.label,p.x,p.y+48); }); ctx.fillStyle='#f6f2ff'; ctx.font='bold 28px Arial'; ctx.fillText('Haunted World Map',W/2,80); ctx.font='18px Arial'; ctx.fillText('The curtain rises on the next level...',W/2,110); } function drawTitleBackdrop(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#261a48'); g.addColorStop(1,'#09070f'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); for(let i=0;i<6;i++) drawMist(60+i140,80+(i%3)50,90+i8); ctx.textAlign='center'; ctx.fillStyle='#ecf7ff'; ctx.font='bold 42px Arial'; ctx.fillText('Haunted Shadows',W/2,H.28); ctx.fillStyle='#9fd2ff'; ctx.font='bold 34px Arial'; ctx.fillText('Paranormal',W/2,H*.36); } function draw(){ if(state.scene==='map'){ drawWorldMap(); return; } if(state.scene==='title') drawTitleBackdrop(); else drawBackground(); const ox=-state.cameraX; if(state.scene!=='title'){ for(const s of solids) drawSolid(s,ox); for(const m of movers) drawSolid(m,ox); for(const p of pickups) drawPickup(p,ox); for(const e of enemies) drawEnemy(e,ox); if(state.levelIndex===2){ for(const b of state.barrels){ ctx.fillStyle='#7a4a2e'; ctx.beginPath(); ctx.arc(b.x+ox,b.y,b.r,0,Math.PI*2); ctx.fill(); } } drawBoss(ox); drawBossProjectiles(ox); drawGoal(ox); drawPlayer(ox); ctx.fillStyle='rgba(255,255,255,.05)'; ctx.fillRect(0,H-110,W,110); } } function frame(ts){ const dt=(ts-lastTime)/1000; lastTime=ts; update(dt); draw(); requestAnimationFrame(frame); }

function bindHold(btn,key){ const on=e=>{e.preventDefault(); keys[key]=true;}; const off=e=>{e.preventDefault(); keys[key]=false;}; btn.addEventListener('touchstart',on,{passive:false}); btn.addEventListener('touchend',off,{passive:false}); btn.addEventListener('touchcancel',off,{passive:false}); btn.addEventListener('mousedown',on); btn.addEventListener('mouseup',off); btn.addEventListener('mouseleave',off); } bindHold(document.getElementById('leftBtn'),'left'); bindHold(document.getElementById('rightBtn'),'right'); const jumpBtn=document.getElementById('jumpBtn'); const doJump=e=>{ e.preventDefault(); keys.jump=true; setTimeout(()=>keys.jump=false,120); }; jumpBtn.addEventListener('touchstart',doJump,{passive:false}); jumpBtn.addEventListener('mousedown',doJump); addEventListener('keydown',e=>{ if(['ArrowLeft','ArrowRight','ArrowUp','Space','Enter'].includes(e.code)) e.preventDefault(); if(e.code==='ArrowLeft') keys.left=true; if(e.code==='ArrowRight') keys.right=true; if(e.code==='ArrowUp'||e.code==='Space') keys.jump=true; if(e.code==='Enter'&&state.scene==='title'){ hideOverlay(); started=true; state.scene='playing'; } }); addEventListener('keyup',e=>{ if(e.code==='ArrowLeft') keys.left=false; if(e.code==='ArrowRight') keys.right=false; if(e.code==='ArrowUp'||e.code==='Space') keys.jump=false; }); startBtn.addEventListener('click',()=>{ hideOverlay(); if(state.scene==='title'||state.scene==='map'){ started=true; state.scene='playing'; } else if(state.scene==='end') resetGame(true); }); restartBtn.addEventListener('click',()=>{ started=false; resetGame(true); }); soundBtn.addEventListener('click',()=>{ soundOn=!soundOn; soundBtn.textContent=soundOn?'🔊 Sound':'🔇 Sound'; });

cloneLevel(0); showTitle(); overlay.style.display='flex'; updateHUD(); requestAnimationFrame(frame); })(); </script>
